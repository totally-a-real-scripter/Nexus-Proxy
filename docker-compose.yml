# Optional local development stack only.
#
# Production on Coolify should use TWO separate Dockerfile resources:
#   1) nexus (repo root Dockerfile) on port 37291 with a public domain
#   2) wisp  (wisp-server/Dockerfile) on port 37292 with no public domain
#
# This compose file is intentionally kept for local convenience and is not the
# recommended production deployment path.

version: "3.9"

services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "37291:37291"
    environment:
      NODE_ENV: production
      PORT: 37291
      HOST: 0.0.0.0

      BARE_PREFIX: /bare/
      UV_PREFIX: /service/
      SCRAMJET_PREFIX: /scram/

      # Local-dev compose default only.
      # In Coolify, set this to the internal hostname of your Wisp resource.
      WISP_URL: ws://wisp:37292

      # Browser-facing websocket URL served by Nexus transport config.
      # Must point to Nexus /wisp/ (never direct :37292).
      PUBLIC_WISP_URL: ws://localhost:37291/wisp/

      FRONTEND_PATH: /app/frontend/dist

      TRUST_PROXY: 1
      CORS_ORIGIN: "*"
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 200
      CACHE_ENABLED: true
      CACHE_MAX_AGE_MS: 300000
      PROXY_TIMEOUT_MS: 30000
      DOMAIN_BLOCKLIST: ""
      DOMAIN_ALLOWLIST: ""
      SEARCH_ENGINE: https://www.google.com/search?q=
      WISP_LOG_LEVEL: info
    depends_on:
      wisp:
        condition: service_healthy

  wisp:
    build:
      context: ./wisp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "37292"
    environment:
      WISP_HOST: 0.0.0.0
      WISP_PORT: 37292
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',37292),2); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 3
