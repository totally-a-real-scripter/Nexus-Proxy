# ═══════════════════════════════════════════════════════════════════════════
# Nexus Proxy — Docker Compose
#
# Services:
#   nexus     — Node.js backend + frontend (port 8080)
#   wisp      — Python WebSocket-TCP tunnel server (internal port 7000)
#   nginx     — Reverse proxy + TLS termination (bound to non-80/443 host ports)
#
# Internal network:  nexus-net (bridge, no external exposure)
# Data flow:
#   browser → nginx → nexus (HTTP/WS) → wisp → target host
# ═══════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Nexus backend + frontend ──────────────────────────────────────────────
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    networks:
      - nexus-net
    expose:
      - "8080"
    environment:
      NODE_ENV:             ${NODE_ENV:-production}
      PORT:                 8080
      HOST:                 0.0.0.0
      BARE_PREFIX:          /bare/
      UV_PREFIX:            /service/
      SCRAMJET_PREFIX:      /scram/
      # Internal wisp URL (Docker internal DNS)
      WISP_URL:             ws://wisp:7000
      # Public URL that browsers connect to for WebSocket tunnelling
      PUBLIC_WISP_URL:      ${PUBLIC_WISP_URL:-ws://localhost/wisp/}
      FRONTEND_PATH:        /app/frontend/dist
      CORS_ORIGIN:          ${CORS_ORIGIN:-*}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX:       ${RATE_LIMIT_MAX:-200}
      CACHE_ENABLED:        ${CACHE_ENABLED:-true}
      CACHE_MAX_AGE_MS:     ${CACHE_MAX_AGE_MS:-300000}
      PROXY_TIMEOUT_MS:     ${PROXY_TIMEOUT_MS:-30000}
      DOMAIN_BLOCKLIST:     ${DOMAIN_BLOCKLIST:-}
      DOMAIN_ALLOWLIST:     ${DOMAIN_ALLOWLIST:-}
      SEARCH_ENGINE:        ${SEARCH_ENGINE:-https://www.google.com/search?q=}
    depends_on:
      wisp:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus:   "1.0"

  # ── Wisp server (Python WebSocket → TCP tunnel) ────────────────────────────
  wisp:
    build:
      context: ./wisp-server
      dockerfile: Dockerfile
    container_name: nexus-wisp
    restart: unless-stopped
    networks:
      - nexus-net
    expose:
      - "7000"
    environment:
      WISP_HOST:        0.0.0.0
      WISP_PORT:        7000
      LOG_LEVEL:        ${WISP_LOG_LEVEL:-INFO}
      WISP_MAX_PAYLOAD: ${WISP_MAX_PAYLOAD:-10485760}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('localhost',7000),2); s.close()"]
      interval: 15s
      timeout:  5s
      retries:  3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus:   "0.5"

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  # Handles TLS, WebSocket upgrades, and routes /wisp/ to the wisp container
  nginx:
    image: nginx:1.25-alpine
    container_name: nexus-nginx
    restart: unless-stopped
    networks:
      - nexus-net
    expose:
      - "8081"
      - "8443"
    ports:
      - "${NGINX_HTTP_PORT:-8081}:8081"
      - "${NGINX_HTTPS_PORT:-8443}:8443"
    volumes:
      # Mount only virtual host configs to avoid file-vs-directory
      # bind issues on platforms that materialize missing paths as folders.
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Mount your TLS certs here, or use Coolify's automatic certs
      - ${TLS_CERT_PATH:-./nginx/certs}:/etc/nginx/certs:ro
    depends_on:
      - nexus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  nexus-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
