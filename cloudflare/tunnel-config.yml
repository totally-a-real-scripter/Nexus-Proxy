# ── Nexus Proxy — Cloudflare Tunnel Configuration ────────────────────────────
# File: ~/.cloudflared/config.yml  (on your server running cloudflared)
#
# This configures cloudflared to forward your public domain to the nexus
# container running on port 37291 (localhost only).
#
# PREREQUISITES:
#   1. Install cloudflared on your server
#   2. Run: cloudflared tunnel login
#   3. Run: cloudflared tunnel create nexus-proxy
#   4. Note the tunnel UUID printed — put it in <TUNNEL_UUID> below
#   5. Copy this file to ~/.cloudflared/config.yml
#   6. Start: cloudflared tunnel run nexus-proxy
#
# In Zero Trust dashboard (one.dash.cloudflare.com):
#   Networks → Tunnels → nexus-proxy → Public Hostnames → Add a hostname:
#     Subdomain:  nexus          (or whatever prefix you want)
#     Domain:     yourdomain.com
#     Service:    HTTP  http://localhost:37291
#     (Cloudflare handles HTTPS — no need to configure TLS here)
# ─────────────────────────────────────────────────────────────────────────────

tunnel: d156ab3b-92d6-4a4c-bd3c-eb799c41e9e6
credentials-file: /root/.cloudflared/d156ab3b-92d6-4a4c-bd3c-eb799c41e9e6.json

# Route all traffic on nexus.yourdomain.com → nexus on localhost:37291
# Cloudflare terminates TLS; cloudflared → nexus is plain HTTP.
ingress:
  - hostname: nexus.garfield-math.xyz
    service: http://localhost:37291
    originRequest:
      # Cloudflare sends WebSocket upgrade headers — tell cloudflared to pass them
      noTLSVerify: false
      # Increase timeout for long-lived WebSocket connections (Wisp + SSE)
      connectTimeout: 10s
      tcpKeepAlive: 30s
      keepAliveTimeout: 90s
      keepAliveConnections: 100
      # HTTP/2 between cloudflared and nexus (optional but faster)
      http2Origin: false  # set true only if nexus listens on h2c

  # Catch-all: reject anything not matched above
  - service: http_status:404
