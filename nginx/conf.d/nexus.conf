# ── Nexus Proxy — Nginx Virtual Host ──────────────────────────────────────
# Handles HTTP→HTTPS redirect, WebSocket upgrade for /wisp/, and proxy

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

# HTTPS / Main server block
server {
  listen 443 ssl http2;
  server_name _;

  # ── TLS ──────────────────────────────────────────────────────────────────
  # Point these at your certificates.
  # Coolify manages TLS automatically — set paths via env or use Coolify's
  # built-in Let's Encrypt integration (no manual cert management needed).
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  ssl_protocols              TLSv1.2 TLSv1.3;
  ssl_ciphers                HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers  on;
  ssl_session_cache          shared:SSL:10m;
  ssl_session_timeout        10m;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options           SAMEORIGIN always;
  add_header X-Content-Type-Options    nosniff    always;
  add_header Referrer-Policy           "no-referrer" always;

  # ── /wisp/ → Python Wisp server (WebSocket) ──────────────────────────────
  # Browser Epoxy transport connects here for TCP tunnelling
  location /wisp/ {
    proxy_pass         http://wisp:7000/;
    proxy_http_version 1.1;

    # WebSocket upgrade
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout  3600;   # Long-lived WS connections
    proxy_send_timeout  3600;
    proxy_connect_timeout 10;

    proxy_buffering off;        # Don't buffer WebSocket frames
  }

  # ── Everything else → Node.js backend ────────────────────────────────────
  location / {
    proxy_pass         http://nexus:8080;
    proxy_http_version 1.1;

    # WebSocket support for bare-server WS upgrades
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout  120;
    proxy_send_timeout  120;
    proxy_connect_timeout 10;

    # Disable buffering for SSE streams
    proxy_buffering      off;
    proxy_cache_bypass   $http_upgrade;
  }

  # ── Static asset caching ─────────────────────────────────────────────────
  location ~* \.(js|css|woff2?|png|jpg|svg|ico|webp)$ {
    proxy_pass       http://nexus:8080;
    proxy_cache_valid 200 1d;
    add_header Cache-Control "public, max-age=86400, immutable";
    proxy_hide_header X-Powered-By;
  }
}
