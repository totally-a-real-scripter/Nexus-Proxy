<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Proxy</title>
    <link rel="stylesheet" href="/style.css?v=scramjet-11" />
    <script src="/baremux/index.js?v=scramjet-11"></script>
    <script src="/epoxy/index.js?v=scramjet-11"></script>
  </head>
  <body>
    <iframe id="proxyFrame" class="proxy-frame" title="Proxied content"></iframe>

    <div id="spotlightShell" class="spotlight-shell is-open">
      <form id="searchForm" class="spotlight-panel" autocomplete="off">
        <div class="spotlight-input-row">
          <span class="spotlight-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </span>

          <input
            id="urlInput"
            class="spotlight-input"
            type="text"
            placeholder="Search or enter URL"
            spellcheck="false"
            autocomplete="off"
            aria-label="Search or enter URL"
          />

          <button id="clearInput" class="spotlight-clear" type="button" aria-label="Clear search">×</button>
        </div>
      </form>

      <button id="spotlightToggle" class="spotlight-toggle" type="button" aria-label="Toggle search">
        <span class="toggle-arrow">⌄</span>
      </button>
    </div>

    <section class="reset-panel" id="resetPanel" hidden>
      <h2>Proxy startup failed</h2>
      <p>Scramjet could not initialize. You can retry once or reset proxy storage.</p>
      <div class="editor-actions">
        <button id="retryInitBtn" type="button">Retry</button>
        <button id="resetProxyStorageBtn" type="button">Reset storage</button>
      </div>
    </section>

    <script src="/scram/scramjet.all.js?v=scramjet-11"></script>
    <script src="/client.js?v=scramjet-11" defer></script>
  </body>
</html>
