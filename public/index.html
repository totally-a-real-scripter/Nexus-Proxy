<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Proxy</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/baremux/index.js?v=scramjet-8"></script>
    <script src="/epoxy/index.js?v=scramjet-8"></script>
    <script src="/scram/scramjet.all.js?v=scramjet-8"></script>
    <script src="/client.js?v=scramjet-8" defer></script>
  </head>
  <body>
    <main class="app-shell" id="appShell">
      <section class="viewport" id="viewport">
        <iframe
          id="proxyFrame"
          class="proxy-frame"
          title="Proxied content"
          referrerpolicy="no-referrer"
          allow="clipboard-read; clipboard-write"
        ></iframe>
      </section>

      <div id="spotlightShell" class="spotlight-shell">
        <button id="spotlightToggle" class="spotlight-toggle" type="button" aria-label="Toggle search" aria-expanded="false">
          <span class="toggle-arrow" id="toggleArrow" aria-hidden="true">⌄</span>
        </button>

        <section class="spotlight-panel" id="spotlightPanel" aria-label="Address and search">
          <form id="navForm" autocomplete="off" spellcheck="false">
            <div class="spotlight-input-row">
              <span class="spotlight-icon" aria-hidden="true">⌕</span>
              <input
                id="addressInput"
                class="spotlight-input"
                type="text"
                inputmode="url"
                placeholder="Search or enter URL"
                aria-label="Address or search"
                autocomplete="off"
                spellcheck="false"
              />
              <button id="clearInput" class="spotlight-clear" type="button" aria-label="Clear search">×</button>
            </div>

            <div id="engineRow" class="engine-row" aria-label="Search engines"></div>
          </form>

          <button class="link-btn" id="toggleCustomEditor" type="button">Add search engine</button>

          <form class="custom-engine-editor" id="customEngineEditor" hidden>
            <input id="customEngineName" type="text" placeholder="Name" maxlength="32" required />
            <input
              id="customEngineTemplate"
              type="url"
              placeholder="https://example.com/search?q={query}"
              inputmode="url"
              required
            />
            <div class="editor-actions">
              <button type="submit">Save</button>
              <button type="button" id="cancelCustomEditor">Cancel</button>
            </div>
            <p id="customEditorError" class="inline-error" aria-live="polite"></p>
          </form>
        </section>
      </div>

      <section class="reset-panel" id="resetPanel" hidden>
        <h2>Proxy startup failed</h2>
        <p>Scramjet could not initialize. You can retry once or reset proxy storage.</p>
        <div class="editor-actions">
          <button id="retryInitBtn" type="button">Retry</button>
          <button id="resetProxyStorageBtn" type="button">Reset storage</button>
        </div>
      </section>
    </main>
  </body>
</html>
