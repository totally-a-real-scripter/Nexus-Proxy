<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 15% 20%, #1d2c4f 0%, #070b16 45%, #05070d 100%);
        color: rgba(255, 255, 255, 0.9);
      }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .home-card {
        width: min(520px, 100%);
        border-radius: 22px;
        padding: 30px 32px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05)), rgba(245, 247, 255, 0.09);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(24px) saturate(170%);
        -webkit-backdrop-filter: blur(24px) saturate(170%);
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(34px, 5vw, 46px);
        letter-spacing: -0.04em;
      }
      p {
        margin: 0;
        font-size: clamp(16px, 2.6vw, 20px);
        color: rgba(255, 255, 255, 0.72);
      }
    </style>
  </head>
  <body>
    <main class="home-card" aria-label="Home placeholder">
      <h1>Home</h1>
      <p>Search or enter a URL to begin.</p>
    </main>
  </body>
</html>
